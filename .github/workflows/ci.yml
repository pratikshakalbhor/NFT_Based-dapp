name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

# ============================================================
# Job 1: Run Tests
# ============================================================

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: false


# ============================================================
# Job 2: Build React App
# ============================================================

  build:
    name: Build App
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Build production
        run: npm run build
        env:
          CI: false
          REACT_APP_CONTRACT_ID: ${{ secrets.REACT_APP_CONTRACT_ID }}
          REACT_APP_NETWORK: TESTNET

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/


# ============================================================
# Job 3: Rust Contract Check
# ============================================================

  contract:
    name: Check Rust Contract
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            token/contracts/hello-world/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check NFT contract
        run: |
          cd token/contracts/hello-world
          cargo check --target wasm32-unknown-unknown


# ============================================================
# Job 4: Deploy to Vercel
# ============================================================

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy
        run: |
          vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}